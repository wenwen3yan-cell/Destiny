    <style>
        :root {
            --bg-color: #F9F8F6;
            --bg-warm: #F5F2EB;
            --text-primary: #2C2C2C;
            --text-secondary: #5C5C5C;
            --accent-gold: #B76E3A;
            --accent-ochre: #8B5A2B;
            --border-light: rgba(0, 0, 0, 0.05);
            --card-bg: rgba(255, 255, 255, 0.85);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, var(--bg-warm) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.8;
            overflow-x: hidden;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
        }

        /* 顶部标题区 */
        .header {
            text-align: center;
            margin-bottom: 48px;
            position: relative;
        }

        .header::before {
            content: '◆';
            display: block;
            color: var(--accent-gold);
            font-size: 12px;
            margin-bottom: 16px;
            opacity: 0.6;
            letter-spacing: 8px;
        }

        h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 6px;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            letter-spacing: 4px;
            font-weight: 300;
        }

        /* 数字显示区 */
        .number-display {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 48px 0;
            position: relative;
        }

        .number-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .number-circle.shaking {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-8px) rotate(-5deg); }
            75% { transform: translateX(8px) rotate(5deg); }
        }

        .number-text {
            font-family: 'Noto Serif SC', serif;
            font-size: 72px;
            font-weight: 700;
            color: var(--accent-gold);
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .number-text.show {
            opacity: 1;
            transform: scale(1);
        }

        .number-placeholder {
            font-size: 14px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            position: absolute;
        }

        .number-circle.has-number .number-placeholder {
            display: none;
        }

        /* 按钮区 */
        .button-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 48px;
        }

        button {
            padding: 14px 32px;
            border: none;
            border-radius: 4px;
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 15px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--text-primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--accent-ochre);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 90, 43, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-light);
        }

        .btn-secondary:hover {
            background: var(--card-bg);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        button:active {
            transform: scale(0.98);
        }

        /* 提示信息 */
        .hint {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: -24px;
            margin-bottom: 32px;
            opacity: 0;
            transition: opacity 0.3s ease;
            font-style: italic;
        }

        .hint.show {
            opacity: 1;
        }

        /* 命格卡片 */
        .destiny-card {
            background: var(--card-bg);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 40px 32px;
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            display: none;
        }

        .destiny-card.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-light);
        }

        .card-number {
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .card-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 4px;
        }

        .card-section {
            margin-bottom: 28px;
            position: relative;
            padding-left: 20px;
        }

        .card-section::before {
            content: '';
            position: absolute;
            left: 0;
            top: 8px;
            width: 4px;
            height: 4px;
            background: var(--accent-gold);
            border-radius: 50%;
        }

        .section-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 15px;
            font-weight: 600;
            color: var(--accent-ochre);
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .section-content {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.9;
            text-align: justify;
        }

        .heart-seal {
            margin-top: 32px;
            padding: 24px;
            background: linear-gradient(135deg, rgba(183, 110, 58, 0.05) 0%, rgba(139, 90, 43, 0.03) 100%);
            border-radius: 8px;
            border-left: 3px solid var(--accent-gold);
            position: relative;
        }

        .heart-seal .section-title {
            color: var(--accent-gold);
        }

        .heart-seal .section-content {
            font-family: 'Noto Serif SC', serif;
            font-style: italic;
            font-size: 16px;
            color: var(--accent-ochre);
            line-height: 2;
        }

        /* 底部签名 */
        .footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            font-style: italic;
            opacity: 0.7;
        }

        .footer::before {
            content: '—';
            display: block;
            margin-bottom: 12px;
            letter-spacing: 8px;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            h1 {
                font-size: 24px;
                letter-spacing: 4px;
            }

            .number-circle {
                width: 120px;
                height: 120px;
            }

            .number-text {
                font-size: 56px;
            }

            .button-group {
                flex-direction: column;
                align-items: center;
            }

            button {
                width: 160px;
            }

            .destiny-card {
                padding: 28px 20px;
            }

            .card-title {
                font-size: 22px;
            }
        }

        /* 装饰元素 - 已改为知、行 */
        .decoration {
            position: fixed;
            pointer-events: none;
            opacity: 0.03;
            font-family: 'Noto Serif SC', serif;
            font-size: 200px;
            z-index: -1;
        }

        .decoration-1 {
            top: -50px;
            right: -30px;
            transform: rotate(15deg);
        }

        .decoration-2 {
            bottom: -30px;
            left: -20px;
            transform: rotate(-10deg);
        }
    </style>

        let currentNumber = null;
        let isShaking = false;

        function shakeNumber() {
            if (isShaking) return;

            isShaking = true;
            var circle = document.getElementById('numberCircle');
            var numberText = document.getElementById('numberText');
            var hint = document.getElementById('hint');
            var card = document.getElementById('destinyCard');

            // 隐藏之前的卡片
            card.classList.remove('show');
            hint.classList.remove('show');

             // 新增：隐藏分享按钮
            const shareBtn = document.getElementById('shareBtn');
            if (shareBtn) shareBtn.classList.remove('show');

            // 开始摇晃动画
            circle.classList.add('shaking');
            numberText.classList.remove('show');

            // 模拟摇签过程
            var count = 0;
            var maxCount = 8;
            var interval = setInterval(function() {
                var tempNum = Math.floor(Math.random() * 300) + 1;
                numberText.textContent = tempNum;
                numberText.classList.add('show');

                count++;
                if (count >= maxCount) {
                    clearInterval(interval);

                    // 最终结果
                    currentNumber = Math.floor(Math.random() * 300) + 1;
                    numberText.textContent = currentNumber;
                    circle.classList.add('has-number');
                    circle.classList.remove('shaking');

                    // 显示提示
                    hint.textContent = '数字已现，点击查看命理';
                    hint.classList.add('show');

                    isShaking = false;
                }
            }, 80);
        }

        function viewDestiny() {
            var hint = document.getElementById('hint');
            var card = document.getElementById('destinyCard');

            if (!currentNumber) {
                hint.textContent = '请先摇出今日之数';
                hint.classList.add('show');

                // 震动提示
                var circle = document.getElementById('numberCircle');
                circle.style.transform = 'translateX(-5px)';
                setTimeout(function() {
                    circle.style.transform = 'translateX(5px)';
                    setTimeout(function() {
                        circle.style.transform = 'translateX(0)';
                    }, 100);
                }, 100);
                return;
            }

            var data = destinyData[currentNumber - 1];

            // 填充数据
            document.getElementById('cardNumber').textContent = '第 ' + currentNumber + ' · 签';
            document.getElementById('cardTitle').textContent = data.title;
            document.getElementById('sectionColor').textContent = data.color;
            document.getElementById('sectionCareer').textContent = data.career;
            document.getElementById('sectionLove').textContent = data.love;
            document.getElementById('sectionHeart').textContent = data.heart;

            // 显示卡片
            card.classList.remove('show');
            setTimeout(function() {
                card.classList.add('show');
                hint.classList.remove('show');

                // 平滑滚动到卡片
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                
                                // 更新分享内容（如果支持动态更新）
                if (typeof updateShareContent === 'function') {

                       setTimeout(() => {

                // 更新 document title（浏览器标签）

                // 更新 meta 标签（部分浏览器支持）
                document.querySelector('meta[property=\"og:title\"]').setAttribute('content', shareData.title);
                document.querySelector('meta[property=\"og:description\"]').setAttribute('content', shareData.desc);
            }
        }

        // 注意：这是给摇签后用的，当前页面不需要微信 JS-SDK 也能基础分享
    </script>

    <script>
            // 生成二维码
        function generateQRCode() {
            const qrcodeDiv = document.getElementById('qrcode');
            qrcodeDiv.innerHTML = ''; // 清空之前的
            
            new QRCode(qrcodeDiv, {
                text: 'https://When-bit.github.io/Destiny/index.html',
                width: 90,
                height: 90,
                colorDark: '#2C2C2C',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });
        }    
        // 生成分享海报
        function generateSharePoster() {
            if (!currentNumber) {
                alert('请先摇出今日之数');
                return;
            }
            
            const data = destinyData[currentNumber - 1];
            
            // 填充模板
            document.getElementById('posterNumber').textContent = `第 ${currentNumber} 签`;
            document.getElementById('posterTitle').textContent = data.title;
            document.getElementById('posterColor').textContent = data.color;
            document.getElementById('posterCareer').textContent = data.career;
            document.getElementById('posterHeart').textContent = data.heart;

            
            // 生成二维码
            generateQRCode();
            
            // 延迟等二维码渲染完成
            setTimeout(() => {
          
            // 使用 html2canvas 生成图片
            const element = document.getElementById('sharePosterTemplate');
            
                html2canvas(element, {
                scale: 2, // 高清输出
                useCORS: true,
                allowTaint: true,
                backgroundColor: null,
                logging: false
                }).then(canvas => {
                // 转换为图片
                const imgData = canvas.toDataURL('image/png', 1.0);
                
                // 显示预览
                const img = document.getElementById('generatedImage');
                const overlay = document.getElementById('imageOverlay');
                const hint = document.getElementById('imageHint');
                
                img.src = imgData;
                img.style.display = 'block';
                overlay.style.display = 'block';
                hint.style.display = 'block';
                
                // 自动下载（可选）
                // const link = document.createElement('a');
                // link.download = `七星曜-第${currentNumber}签-${data.title}.png`;
                // link.href = imgData;
                // link.click();
            }).catch(err => {
                console.error('生成图片失败:', err);
                                   alert('生成图片失败，请重试');
                });
            }, 100); // 100ms 延迟等二维码渲染
        }
        
        // 关闭图片预览
        function closeImagePreview() {
            document.getElementById('generatedImage').style.display = 'none';
            document.getElementById('imageOverlay').style.display = 'none';
            document.getElementById('imageHint').style.display = 'none';
        }
